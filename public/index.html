<!DOCTYPE html>
<html lang="en">
<head>

    <!-- 🔥 BRAND TITLE -->
    <title>KNOCKSSTUDiOS • LUCID LUMA AXON Viewer</title>

    <!-- 🔥 REQUIRED META -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">

    <!-- 🔥 BRAND DESCRIPTION -->
    <meta name="description" content="KNOCKSSTUDiOS LUCID LUMA AXON • UltraHDR 360° material viewer powered by three.js and cinematic GPU rendering.">

    <!-- 🔥 BRAND COLOR (Dual-Energy Core) -->
    <meta name="theme-color" content="#00FFE5">

    <!-- 🔥 INLINE CSS (NO EXTERNAL FILE NEEDED) -->
    <style>
        :root {
            --lucid-bg: #02030a;
            --lucid-panel: rgba(7, 12, 24, 0.96);
            --lucid-border: rgba(148, 163, 184, 0.55);
            --lucid-text-main: #e5e7eb;
            --lucid-text-soft: #9ca3af;
            --lucid-accent-a: #00ffe5;
            --lucid-accent-b: #008cff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            background:
                radial-gradient(circle at 0% 0%, #00ffe510 0, #02030a 40%, #000000 100%);
            color: var(--lucid-text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            overflow: hidden;
        }

        /* 🔥 INFO PANEL */
        #info {
            position: absolute;
            top: 18px;
            left: 18px;
            padding: 14px 18px;
            border-radius: 14px;
            background: linear-gradient(145deg, #050816f0, #020617f0);
            border: 1px solid var(--lucid-border);
            box-shadow:
                0 0 26px rgba(0, 255, 229, 0.35),
                0 0 52px rgba(0, 140, 255, 0.45);
            font-size: 0.82rem;
            line-height: 1.5;
            backdrop-filter: blur(14px);
        }

        #info strong {
            display: block;
            margin-bottom: 4px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            font-size: 0.78rem;
            color: #f9fafb;
            text-shadow:
                0 0 10px rgba(0, 255, 229, 0.7),
                0 0 20px rgba(0, 140, 255, 0.9);
        }

        #info a {
            color: var(--lucid-accent-a);
            text-decoration: none;
            border-bottom: 1px solid rgba(0, 255, 229, 0.4);
        }

        #info a:hover {
            color: var(--lucid-accent-b);
            border-bottom-color: rgba(0, 140, 255, 0.7);
        }

        /* 🔥 GUI POSITION TWEAK (OPTIONAL) */
        .lil-gui.root {
            right: 18px !important;
            top: 18px !important;
        }
    </style>

</head>
<body>

    <!-- 🔥 BRAND INFO BLOCK -->
    <div id="info">
        <strong>KNOCKSSTUDiOS • LUCID LUMA : AXON</strong>
        UltraHDR 360° Material Engine · Dual‑Energy Core Pipeline<br/>
        Cinematic GPU rendering · On‑device ready<br/>
        Powered by <a href="https://threejs.org" target="_blank">three.js</a>
    </div>

    <!-- 🔥 IMPORT MAP (ENGINE DEPENDENCIES) -->
    <script type="importmap">
    {
        "imports": {
            "three": "../build/three.module.js",
            "three/addons/": "./jsm/"
        }
    }
    </script>

    <!-- 🔥 YOUR ENGINE MODULE -->
    <script type="module">

        import * as THREE from 'three';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
        import { UltraHDRLoader } from 'three/addons/loaders/UltraHDRLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        /* 🔥 YOUR PARAMS */
        const params = {
            autoRotate: true,
            metalness: 1.0,
            roughness: 0.0,
            exposure: 1.2,
            resolution: '2k',
            type: 'HalfFloatType'
        };

        /* 🔥 ENGINE VARIABLES */
        let renderer, scene, camera, controls, torusMesh, loader;

        init();

        function init() {

            /* 🔥 RENDERER SETUP */
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = params.exposure;

            renderer.setAnimationLoop(render);

            /* 🔥 SCENE */
            scene = new THREE.Scene();

            /* 🔥 OBJECT */
            torusMesh = new THREE.Mesh(
                new THREE.TorusKnotGeometry(1, 0.4, 128, 128, 1, 3),
                new THREE.MeshStandardMaterial({
                    roughness: params.roughness,
                    metalness: params.metalness
                })
            );
            scene.add(torusMesh);

            /* 🔥 CAMERA */
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 500);
            camera.position.set(0, 0, -6);

            /* 🔥 CONTROLS */
            controls = new OrbitControls(camera, renderer.domElement);

            /* 🔥 HDR LOADER */
            loader = new UltraHDRLoader();
            loader.setDataType(THREE.FloatType);

            const loadEnvironment = (resolution, type) => {

                loader.setDataType(THREE[type]);

                loader.load(`textures/equirectangular/spruit_sunrise_${resolution}.hdr.jpg`, (texture) => {

                    texture.mapping = THREE.EquirectangularReflectionMapping;
                    texture.needsUpdate = true;

                    scene.background = texture;
                    scene.environment = texture;

                });

            };

            loadEnvironment(params.resolution, params.type);

            /* 🔥 GUI */
            const gui = new GUI();
            gui.add(params, 'autoRotate');
            gui.add(params, 'metalness', 0, 1, 0.01);
            gui.add(params, 'roughness', 0, 1, 0.01);
            gui.add(params, 'exposure', 0, 4, 0.01);
            gui.add(params, 'resolution', ['2k', '4k']).onChange(v => loadEnvironment(v, params.type));
            gui.add(params, 'type', ['HalfFloatType', 'FloatType']).onChange(v => loadEnvironment(params.resolution, v));
            gui.open();

            window.addEventListener('resize', onWindowResize);

        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function render() {

            torusMesh.material.roughness = params.roughness;
            torusMesh.material.metalness = params.metalness;

            if (params.autoRotate) {
                torusMesh.rotation.y += 0.005;
            }

            renderer.toneMappingExposure = params.exposure;

            controls.update();
            renderer.render(scene, camera);

        }

    </script>
</body>
</html>
