<!DOCTYPE html>
<html lang="en">
<head>
<title>KNOCKSSTUDiOS • UltraHDR 360° Viewer</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
<meta name="description" content="KNOCKSSTUDiOS UltraHDR 360° Material Viewer">
<meta name="theme-color" content="#00F0FF">
<style>body{margin:0;background:#000;color:#00F0FF;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;}</style>
</head>
<body>
<div id="info"><strong>KNOCKSSTUDiOS • UltraHDR Engine</strong><br/>Cinematic 360° GPU rendering • Quantum 44 Teal Pipeline</div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
document.body.appendChild(renderer.domElement);
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
const camera = new THREE.PerspectiveCamera(50,window.innerWidth/window.innerHeight,1,500);
camera.position.set(0,0,-6);
const mesh = new THREE.Mesh(
  new THREE.TorusKnotGeometry(1,0.4,128,128,1,3),
  new THREE.MeshStandardMaterial({metalness:1.0,roughness:0.0,color:0x00F0FF})
);
scene.add(mesh);
scene.add(new THREE.AmbientLight(0xffffff,3));
const controls = new OrbitControls(camera,renderer.domElement);
renderer.setAnimationLoop(()=>{mesh.rotation.y+=0.005;controls.update();renderer.render(scene,camera);});
window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
</script>
</body>
</html>
